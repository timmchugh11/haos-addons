<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Model Debug</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
#canvas { display: block; width: 100vw; height: 100vh; }
#hud {
  position: fixed; top: 14px; left: 14px;
  color: rgba(255,255,255,0.55); font-size: 12px; line-height: 1.7;
  pointer-events: none;
}
#info {
  position: fixed; bottom: 14px; left: 14px; right: 14px;
  color: rgba(255,255,255,0.35); font-size: 11px; line-height: 1.6;
  pointer-events: none;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div id="hud-status">Loading…</div>
  <div id="hud-cam"></div>
</div>
<div id="info">
  Left drag — orbit &nbsp;|&nbsp; Right drag / Ctrl+drag — pan &nbsp;|&nbsp; Scroll — zoom &nbsp;|&nbsp; Double-click — reset
</div>

<script type="module">
import * as THREE from './vendor/three/build/three.module.js';
import { GLTFLoader } from './vendor/three/examples/jsm/loaders/GLTFLoader.js';

const canvas  = document.getElementById('canvas');
const hudStatus = document.getElementById('hud-status');
const hudCam    = document.getElementById('hud-cam');

// ── Renderer ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setClearColor(0x000000, 1);
renderer.setPixelRatio(window.devicePixelRatio || 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ── Scene / Camera ────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);

// Orbit state (spherical coords around target)
const state = {
  theta:  0.4,   // horizontal angle (radians)
  phi:    1.1,   // vertical angle (radians, 0=top, PI=bottom)
  radius: 2.5,   // distance from target
  target: new THREE.Vector3(0, 0, 0),
  panOffset: new THREE.Vector3(),
};

// ── Lights ────────────────────────────────────────────────────────────────────
const keyLight = new THREE.DirectionalLight(0xffffff, 3.0);
keyLight.position.set(3, 5, 4);
keyLight.castShadow = true;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8ab4ff, 1.6);
fillLight.position.set(-4, -1, 3);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.8);
rimLight.position.set(0, -4, -3);
scene.add(rimLight);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));

// ── Grid ──────────────────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(4, 20, 0x333333, 0x222222);
grid.position.y = -0.5;
scene.add(grid);

// ── Load GLB ─────────────────────────────────────────────────────────────────
const loader = new GLTFLoader();
loader.load(
  './starlink_mini_dish.glb',
  (gltf) => {
    const model = gltf.scene;

    // Normalise: center + scale to unit size
    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    model.scale.setScalar(1 / maxDim);
    // position offset must also be in scaled (post-divide) space
    model.position.set(-center.x / maxDim, -center.y / maxDim, -center.z / maxDim);

    model.traverse((child) => {
      if (!child.isMesh) return;
      child.castShadow    = true;
      child.receiveShadow = true;
      child.frustumCulled = false;
      child.material = new THREE.MeshStandardMaterial({
        color:             0xdde4f0,
        emissive:          0x0a1320,
        emissiveIntensity: 0.06,
        metalness:         0.4,
        roughness:         0.5,
        side: THREE.DoubleSide,
      });

      // Wireframe overlay
      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(child.geometry, 20),
        new THREE.LineBasicMaterial({ color: 0x6699cc, transparent: true, opacity: 0.35 })
      );
      child.add(edges);
    });

    scene.add(model);
    hudStatus.textContent = `Loaded — ${(size.x).toFixed(2)} × ${(size.y).toFixed(2)} × ${(size.z).toFixed(2)} (original units)`;
  },
  (xhr) => {
    if (xhr.total) hudStatus.textContent = `Loading… ${Math.round(xhr.loaded / xhr.total * 100)}%`;
  },
  (err) => {
    hudStatus.textContent = `Error: ${err.message || err}`;
    console.error(err);
  }
);

// ── Camera update ─────────────────────────────────────────────────────────────
function updateCamera() {
  const phi   = Math.max(0.05, Math.min(Math.PI - 0.05, state.phi));
  const r     = Math.max(0.2, state.radius);
  const x     = r * Math.sin(phi) * Math.sin(state.theta);
  const y     = r * Math.cos(phi);
  const z     = r * Math.sin(phi) * Math.cos(state.theta);
  const target = state.target.clone().add(state.panOffset);
  camera.position.set(target.x + x, target.y + y, target.z + z);
  camera.lookAt(target);
  hudCam.textContent =
    `θ ${(state.theta * 180 / Math.PI).toFixed(1)}°  φ ${(phi * 180 / Math.PI).toFixed(1)}°  r ${r.toFixed(2)}`;
}

// ── Pointer handling ────────────────────────────────────────────────────────
let drag = null;

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

canvas.addEventListener('pointerdown', (e) => {
  canvas.setPointerCapture(e.pointerId);
  drag = { x: e.clientX, y: e.clientY, button: e.button, ctrl: e.ctrlKey || e.metaKey };
});

canvas.addEventListener('pointermove', (e) => {
  if (!drag) return;
  const dx = e.clientX - drag.x;
  const dy = e.clientY - drag.y;
  drag.x = e.clientX;
  drag.y = e.clientY;

  const isPan = drag.button === 2 || drag.ctrl;
  if (isPan) {
    // Pan in camera-space XY
    const panSpeed = state.radius * 0.0012;
    const right = new THREE.Vector3();
    const up    = new THREE.Vector3();
    camera.getWorldDirection(new THREE.Vector3()); // keep matrix fresh
    right.setFromMatrixColumn(camera.matrixWorld, 0);
    up.setFromMatrixColumn(camera.matrixWorld, 1);
    state.panOffset.addScaledVector(right, -dx * panSpeed);
    state.panOffset.addScaledVector(up,     dy * panSpeed);
  } else {
    // Orbit
    state.theta -= dx * 0.008;
    state.phi   += dy * 0.008;
  }
  updateCamera();
});

canvas.addEventListener('pointerup',     () => { drag = null; });
canvas.addEventListener('pointercancel', () => { drag = null; });

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  state.radius *= 1 + e.deltaY * 0.001;
  state.radius = Math.max(0.2, Math.min(20, state.radius));
  updateCamera();
}, { passive: false });

canvas.addEventListener('dblclick', () => {
  state.theta  = 0.4;
  state.phi    = 1.1;
  state.radius = 2.5;
  state.panOffset.set(0, 0, 0);
  updateCamera();
});

// ── Resize ───────────────────────────────────────────────────────────────────
function onResize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ── Render loop ───────────────────────────────────────────────────────────────
updateCamera();
(function loop() {
  requestAnimationFrame(loop);
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
