<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="color-scheme" content="dark light"/>
<title>Obstruction &amp; Alignment</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:#e6e6e6}
#wrap{position:relative;width:100vw;height:100vh}
#canvas{width:100%;height:100%;display:block;background:transparent;touch-action:none;cursor:grab}
#canvas.is-dragging{cursor:grabbing}

/* ── overlay grid: 3×3 corners + edges ── */
#overlay{
  position:absolute;inset:0;pointer-events:none;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  padding:18px;
  gap:0;
}

/* stat group shared styles */
.stat-group{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.stat-line{
  font-size:14px;
  font-weight:500;
  color:rgba(255,255,255,0.88);
  line-height:1.35;
  text-shadow:0 1px 6px rgba(0,0,0,0.9);
  white-space:nowrap;
}
.stat-line.dim{color:rgba(255,255,255,0.45);font-size:11px;font-weight:400}
.stat-line .val{font-weight:700}
.stat-line .unit{font-size:11px;color:rgba(255,255,255,0.5);margin-left:2px}
.pill-ok  {color:#00D47E}
.pill-warn{color:#FF9500}
.pill-err {color:#FF3B30}

/* corner / edge positions */
#stats-tl{grid-column:1;grid-row:1;align-self:start;justify-self:start}
#stats-tr{grid-column:3;grid-row:1;align-self:start;justify-self:end;text-align:right}
#stats-br{grid-column:3;grid-row:3;align-self:end;justify-self:end;text-align:right}
#stats-bl{grid-column:1;grid-row:3;align-self:end;justify-self:start}

/* legend dots */
.legend{display:flex;align-items:center;gap:8px;font-size:10px;color:rgba(255,255,255,0.35)}
.legend-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
@media(prefers-color-scheme:light){
  html,body{color:#1a1a1a}
  .stat-line{color:rgba(0,0,0,0.85);text-shadow:0 1px 4px rgba(255,255,255,0.7)}
  .stat-line.dim{color:rgba(0,0,0,0.5)}
  .stat-line .unit{color:rgba(0,0,0,0.5)}
  .legend{color:rgba(0,0,0,0.45)}
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="overlay">

    <!-- top-left: throughput + ping -->
    <div id="stats-tl" class="stat-group">
      <div class="stat-line"><span class="val" id="s-dl">—</span><span class="unit">Mbits/s Down</span></div>
      <div class="stat-line"><span class="val" id="s-ul">—</span><span class="unit">Mbits/s Up</span></div>
      <div class="stat-line"><span class="val" id="s-ping">—</span><span class="unit">ms Ping</span></div>
    </div>

    <!-- top-right: legend -->
    <div id="stats-tr" class="stat-group" style="display: none;">
      <div class="legend">
        <span id="legend-dot-clear" class="legend-dot" style="background:#00ffff"></span>Clear
        <span id="legend-dot-obstructed" class="legend-dot" style="background:#ff4444"></span>Obstructed
        <span class="legend-dot" style="background:#00D47E;opacity:0.6"></span>Desired
      </div>
    </div>

    <!-- bottom-right: drop / obstruction / roaming -->
    <div id="stats-br" class="stat-group">
      <div class="stat-line"><span class="val" id="s-drop">—</span><span class="unit">% Dropped</span></div>
      <div class="stat-line" id="s-obst-label">—</div>
      <div class="stat-line" id="s-roam-label">—</div>
    </div>

    <!-- bottom-left: obstruction mesh + alignment detail -->
    <div id="stats-bl" class="stat-group">
      <div class="stat-line dim">Sky: <span id="st-samples">—</span> tracked<span id="obstructed-wrap" style="display:none">, <span id="st-obstructed">—</span> blocked</span></div>
      <div class="stat-line dim">Az <span id="actual-az">—</span>° El <span id="actual-el">—</span>° <span style="color:rgba(255,255,255,0.3)">actual</span></div>
      <div class="stat-line dim">Az <span id="desired-az">—</span>° El <span id="desired-el">—</span>° <span style="color:rgba(0,212,126,0.7)">desired</span></div>
    </div>

  </div><!-- #overlay -->
</div><!-- #wrap -->

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const BASE = (typeof window.__BASE__ === 'string') ? window.__BASE__ : '';
const REFRESH_INTERVAL_MS = 5000;
const OBSTRUCTED_SNR_THRESHOLD = 0.65;

// ── View state ────────────────────────────────────────────────────────────────
const view = {
  canvas: null, renderer: null, scene: null, camera: null,
  obsGroup: null, mapOrientGroup: null, yawGroup: null, THREE: null,
  cellMeshes: [], cells: [],
  dishLoadStarted: false,
  dishOrientGroup: null,     // solid dish — actual az/el
  desiredOrientGroup: null,  // ghost dish — desired az/el
  _pendingAlign: null,
  yaw: 0, pitch: 0.5, zoom: 1.05,
  yawVel: 0.0003, baseYawVel: 0.0003, spinRaf: null,
  velHistory: [],
  dragging: false, pointerId: null, lastX: 0, lastY: 0,
};

// ── API ───────────────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(BASE + '/api' + path);
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || 'API error');
  return j.data;
}

function setEl(id, val) { const e = document.getElementById(id); if (e) e.textContent = val; }

// ── Data load ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [obstrRes, alignRes, statusRes] = await Promise.allSettled([
      apiFetch('/dishy/obstruction-map'),
      apiFetch('/dishy/alignment'),
      apiFetch('/dishy/status'),
    ]);

    // ── Obstruction cells ──
    if (obstrRes.status !== 'fulfilled') throw new Error(obstrRes.reason?.message || 'obstruction-map failed');
    const data = obstrRes.value;
    const snr  = data.snr || [];
    const rows = data.numRows || 1;
    const cols = data.numCols || Math.round(snr.length / rows);
    view.cells = [];
    let untracked = 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const val = snr[r * cols + c];
        const x = ((cols - 1 - c + 0.5) / cols) * 2 - 1;
        const y = ((r + 0.5) / rows) * 2 - 1;
        const radial = x * x + y * y;
        if (radial > 1) continue;
        if (val == null || val < 0) { untracked++; continue; }
        view.cells.push({ x, y, z: Math.sqrt(1 - radial), value: Math.min(1, Math.max(0, val)) });
      }
    }
    if (view.scene) { buildCellMesh(); renderMap(); startSpin(); }
    const obstructed = view.cells.filter(c => c.value < OBSTRUCTED_SNR_THRESHOLD).length;
    setEl('st-samples',    view.cells.length.toLocaleString());
    setEl('st-untracked',  untracked.toLocaleString());
    setEl('st-obstructed', obstructed.toLocaleString());
    document.getElementById('obstructed-wrap').style.display = obstructed > 0 ? '' : 'none';

    // ── Alignment ──
    if (alignRes.status === 'fulfilled') {
      const d   = alignRes.value;
      const aAz = typeof d.boresightAzimuthDeg          === 'number' ? d.boresightAzimuthDeg          : null;
      const aEl = typeof d.boresightElevationDeg        === 'number' ? d.boresightElevationDeg        : null;
      const dAz = typeof d.desiredBoresightAzimuthDeg   === 'number' ? d.desiredBoresightAzimuthDeg   : null;
      const dEl = typeof d.desiredBoresightElevationDeg === 'number' ? d.desiredBoresightElevationDeg : null;
      setEl('actual-az',  aAz != null ? aAz.toFixed(1) : '—');
      setEl('actual-el',  aEl != null ? aEl.toFixed(1) : '—');
      setEl('desired-az', dAz != null ? dAz.toFixed(1) : '—');
      setEl('desired-el', dEl != null ? dEl.toFixed(1) : '—');
      if (aAz != null && aEl != null) {
        view._pendingAlign = { aAz, aEl, dAz, dEl };
        applyDishOrientation(aAz, aEl);
        if (dAz != null && dEl != null) applyDesiredOrientation(dAz, dEl);
      }
    }

    // ── Status ──
    if (statusRes.status === 'fulfilled') {
      const s   = statusRes.value;
      const dl  = s.downlinkThroughputBps != null ? (s.downlinkThroughputBps / 1e6).toFixed(2) : '—';
      const ul  = s.uplinkThroughputBps   != null ? (s.uplinkThroughputBps   / 1e6).toFixed(2) : '—';
      const ping = s.popPingLatencyMs     != null ? Math.round(s.popPingLatencyMs)              : '—';
      const drop = ((s.popPingDropRate ?? 0) * 100).toFixed(1);
      setEl('s-dl',   dl);
      setEl('s-ul',   ul);
      setEl('s-ping', ping !== '—' ? ping : '—');
      setEl('s-drop', drop);

      // Obstruction flag
      const alerts = s.alerts || {};
      const hasObstruct = alerts.obstructed === true || alerts.roofObstruction === true || alerts.fresnelZoneObstruction === true;
      const obstEl = document.getElementById('s-obst-label');
      if (obstEl) {
        obstEl.className = 'stat-line ' + (hasObstruct ? 'pill-warn' : '');
        obstEl.textContent = hasObstruct ? 'Obstructed' : 'No Obstructions';
      }

      // Roaming flag
      const roaming = s.roaming ?? alerts.roaming ?? false;
      const roamEl = document.getElementById('s-roam-label');
      if (roamEl) {
        roamEl.className = 'stat-line ' + (roaming ? 'pill-warn' : '');
        roamEl.textContent = roaming ? 'Roaming' : 'Not Roaming';
      }
    }

  } catch (e) {
    console.error('loadData error:', e);
  }
}

// ── Three.js scene ────────────────────────────────────────────────────────────
window.addEventListener('starlink-obstruction-3d-ready', initScene);

function initCanvas() {
  if (view.canvas) return;
  const canvas = document.getElementById('canvas');
  view.canvas = canvas;
  canvas.addEventListener('pointerdown', e => {
    view.dragging = true; view.pointerId = e.pointerId;
    view.lastX = e.clientX; view.lastY = e.clientY; view.velHistory = [];
    canvas.classList.add('is-dragging'); canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e => {
    if (!view.dragging || e.pointerId !== view.pointerId) return;
    const dx = (e.clientX - view.lastX) * 0.01;
    view.yaw   += dx;
    view.yawVel = dx;
    view.pitch  = Math.max(-0.40, Math.min(1.0, view.pitch + (e.clientY - view.lastY) * 0.01));
    view.lastX  = e.clientX; view.lastY = e.clientY;
    view.velHistory.push(dx); if (view.velHistory.length > 5) view.velHistory.shift();
    renderMap();
  });
  const endDrag = e => {
    if (e && view.pointerId != null && e.pointerId !== view.pointerId) return;
    view.dragging = false; canvas.classList.remove('is-dragging');
    if (canvas.hasPointerCapture(e?.pointerId)) canvas.releasePointerCapture(e.pointerId);
    const h = view.velHistory;
    const flick = h.length ? h.reduce((a, b) => a + b, 0) / h.length : 0;
    view.yawVel = flick;
    if (Math.abs(flick) > 0.0001) {
      const spd = Math.abs(view.baseYawVel);
      view.baseYawVel = flick > 0 ? spd : -spd;
    }
  };
  canvas.addEventListener('pointerup',     endDrag);
  canvas.addEventListener('pointercancel', endDrag);
  canvas.addEventListener('pointerleave',  e => { view.velHistory = []; endDrag(e); });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    view.zoom = Math.max(0.3, Math.min(4.0, view.zoom * (e.deltaY > 0 ? 1.1 : 1/1.1)));
    renderMap();
  }, { passive: false });
  window.addEventListener('resize', renderMap);
}

function initScene() {
  initCanvas();
  if (view.renderer) return;
  const mods = window.__starlinkObstruction3D;
  if (!mods) return;
  const { THREE, GLTFLoader } = mods;
  const canvas = view.canvas;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(46, 1, 0.01, 100);
  camera.position.set(0, 0.9, 2.1); camera.lookAt(0, 0.25, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const key  = new THREE.DirectionalLight(0xffffff, 2.2); key.position.set(2, 4, 3);   scene.add(key);
  const fill = new THREE.DirectionalLight(0x7ab0ff, 0.9); fill.position.set(-2, -1, 2); scene.add(fill);

  // obsGroup: everything that rotates with yaw+pitch
  const obsGroup = new THREE.Group(); scene.add(obsGroup);
  const mapOrientGroup = new THREE.Group(); obsGroup.add(mapOrientGroup);
  // yawGroup: compass ring — yaw only
  const yawGroup = new THREE.Group(); scene.add(yawGroup);
  buildCompassRing(THREE, yawGroup);
  yawGroup.scale.setScalar(0.5);

  view.THREE = THREE; view.renderer = renderer; view.scene = scene;
  view.camera = camera; view.obsGroup = obsGroup; view.mapOrientGroup = mapOrientGroup; view.yawGroup = yawGroup;

  // Dish groups — added to obsGroup so they rotate with the scene
  const dishOrientGroup    = new THREE.Group(); obsGroup.add(dishOrientGroup);
  const desiredOrientGroup = new THREE.Group(); desiredOrientGroup.position.y = 0.03; obsGroup.add(desiredOrientGroup);
  view.dishOrientGroup    = dishOrientGroup;
  view.desiredOrientGroup = desiredOrientGroup;

  if (!view.dishLoadStarted) {
    view.dishLoadStarted = true;
    new GLTFLoader().load(BASE + '/starlink_mini_dish.glb', gltf => {
      const model = gltf.scene;
      const box   = new THREE.Box3().setFromObject(model);
      const ctr   = box.getCenter(new THREE.Vector3());
      const dims  = box.getSize(new THREE.Vector3());
      const s     = 0.32 / (Math.max(dims.x, dims.y, dims.z) || 1);
      model.scale.setScalar(s);
      model.position.set(-ctr.x * s, -ctr.y * s + 0.04, -ctr.z * s);
      // Solid dish — actual pointing
      model.traverse(child => {
        if (!child.isMesh) return;
        child.frustumCulled = false;
        child.material = new THREE.MeshStandardMaterial({ color: 0xe0e8f8, metalness: 0.3, roughness: 0.55, side: THREE.DoubleSide });
      });
      dishOrientGroup.add(model);
      // Ghost dish — desired pointing
      const ghost = model.clone(true);
      ghost.traverse(child => {
        if (!child.isMesh) return;
        child.frustumCulled = false;
        child.material = new THREE.MeshStandardMaterial({
          color: 0x00D47E, metalness: 0.1, roughness: 0.7,
          transparent: true, opacity: 0.35, side: THREE.DoubleSide, depthWrite: false,
        });
      });
      desiredOrientGroup.add(ghost);
      // Apply any data that arrived before the model finished loading
      if (view._pendingAlign) {
        const { aAz, aEl, dAz, dEl } = view._pendingAlign;
        applyDishOrientation(aAz, aEl);
        if (dAz != null && dEl != null) applyDesiredOrientation(dAz, dEl);
      }
      renderMap();
    });
  }

  if (view.cells.length) buildCellMesh();
  renderMap(); startSpin();
}

function buildCompassRing(THREE, grp) {
  const R = 0.708, y = 0.01;
  const pts = Array.from({ length: 129 }, (_, i) => {
    const a = (i / 128) * Math.PI * 2;
    return new THREE.Vector3(Math.cos(a) * R, y, Math.sin(a) * R);
  });
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.45 })));
  for (let i = 0; i < 72; i++) {
    const a = (i / 72) * Math.PI * 2, major = i % 6 === 0;
    const r1 = R - (major ? 0.07 : 0.03);
    grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(Math.cos(a) * r1, y, Math.sin(a) * r1),
      new THREE.Vector3(Math.cos(a) * R,  y, Math.sin(a) * R),
    ]), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: major ? 0.75 : 0.3 })));
  }
  for (const [text, lx, lz] of [['N', 0, -0.828], ['E', 0.828, 0], ['S', 0, 0.828], ['W', -0.828, 0]]) {
    const cv = document.createElement('canvas'); cv.width = 128; cv.height = 128;
    const c2 = cv.getContext('2d');
    c2.fillStyle = 'rgba(255,255,255,0.92)';
    c2.font = 'bold 88px "Segoe UI",sans-serif';
    c2.textAlign = 'center'; c2.textBaseline = 'middle';
    c2.fillText(text, 64, 68);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true }));
    sprite.position.set(lx, y + 0.108, lz);
    sprite.scale.set(0.156, 0.156, 1);
    grp.add(sprite);
  }
}

function getObstructionColors() {
  const defaults = { clear: '#00ffff', obstructed: '#ff4444' };
  try {
    const raw = localStorage.getItem('starlink_gui.obstruction_colors');
    if (!raw) return defaults;
    return { ...defaults, ...JSON.parse(raw) };
  } catch (_) { return defaults; }
}

function buildCellMesh() {
  const THREE = view.THREE;
  if (!THREE || !view.mapOrientGroup) return;
  for (const m of view.cellMeshes) { view.mapOrientGroup.remove(m); m.geometry.dispose(); m.material.dispose(); }
  view.cellMeshes = [];
  if (!view.cells.length) return;
  const geom    = new THREE.BoxGeometry(0.022, 0.001, 0.022);
  const opts    = { transparent: true, opacity: 0.5, depthWrite: false };
  const cols = getObstructionColors();
  const el1 = document.getElementById('legend-dot-clear');
  const el2 = document.getElementById('legend-dot-obstructed');
  if (el1) el1.style.background = cols.clear;
  if (el2) el2.style.background = cols.obstructed;
  const clear   = new THREE.MeshBasicMaterial({ ...opts, color: new THREE.Color(cols.clear) });
  const blocked = new THREE.MeshBasicMaterial({ ...opts, color: new THREE.Color(cols.obstructed) });
  const dummy   = new THREE.Object3D();
  for (const [subset, mat] of [
    [view.cells.filter(c => c.value >= OBSTRUCTED_SNR_THRESHOLD), clear],
    [view.cells.filter(c => c.value  < OBSTRUCTED_SNR_THRESHOLD), blocked],
  ]) {
    if (!subset.length) continue;
    const mesh = new THREE.InstancedMesh(geom, mat, subset.length);
    mesh.frustumCulled = false;
    for (let i = 0; i < subset.length; i++) {
      const { x, y, z } = subset[i];
      dummy.position.set(x, z, y); dummy.rotation.set(0, 0, 0); dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
    }
    mesh.instanceMatrix.needsUpdate = true;
    view.cellMeshes.push(mesh); view.mapOrientGroup.add(mesh);
  }
}

function applyDishOrientation(az, el) {
  const g = view.dishOrientGroup, THREE = view.THREE;
  if (!g || !THREE) return;
  const qTilt = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), (90 - el) * Math.PI / 180);
  const qAz   = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI - az * Math.PI / 180);
  g.quaternion.multiplyQuaternions(qAz, qTilt);
  if (view.mapOrientGroup) view.mapOrientGroup.quaternion.copy(qAz);
  renderMap();
}

function applyDesiredOrientation(az, el) {
  const g = view.desiredOrientGroup, THREE = view.THREE;
  if (!g || !THREE) return;
  const qTilt = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), (90 - el) * Math.PI / 180);
  const qAz   = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI - az * Math.PI / 180);
  g.quaternion.multiplyQuaternions(qAz, qTilt);
  renderMap();
}

function startSpin() {
  if (view.spinRaf) return;
  const loop = () => {
    if (!view.dragging) {
      view.yawVel *= 0.92;
      view.yaw += view.yawVel + view.baseYawVel;
      if (view.yaw >  Math.PI) view.yaw -= Math.PI * 2;
      else if (view.yaw < -Math.PI) view.yaw += Math.PI * 2;
      renderMap();
    }
    view.spinRaf = requestAnimationFrame(loop);
  };
  view.spinRaf = requestAnimationFrame(loop);
}

function renderMap() {
  if (!view.renderer) { initScene(); return; }
  const canvas = view.canvas, renderer = view.renderer;
  const dpr = window.devicePixelRatio || 1;
  const wr  = canvas.parentElement.getBoundingClientRect();
  const w   = Math.max(320, Math.floor(wr.width  || 600));
  const h   = Math.max(200, Math.floor(wr.height || 520));
  renderer.setPixelRatio(dpr); renderer.setSize(w, h, false);
  view.camera.aspect = w / h; view.camera.updateProjectionMatrix();
  const z = view.zoom;
  view.camera.position.set(0, 0.9 * z, 2.1 * z); view.camera.lookAt(0, 0.25, 0);
  const THREE = view.THREE;
  if (THREE) {
    const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), view.yaw);
    const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), view.pitch);
    const q  = new THREE.Quaternion().multiplyQuaternions(qX, qY);
    if (view.obsGroup) view.obsGroup.quaternion.copy(q);
    if (view.yawGroup) view.yawGroup.quaternion.copy(q);
  }
  renderer.render(view.scene, view.camera);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadData();
setInterval(loadData, REFRESH_INTERVAL_MS);
</script>
<script type="module" src="./obstruction-3d.mjs"></script>
</body>
</html>
