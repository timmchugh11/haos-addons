name: "MeshCore GUI"
description: "Custom Home Assistant web GUI for MeshCore companion radios with dashboard, full messages, nodes, channels, map, REST API, and USB serial support"
version: "0.10.2"
slug: "meshcore"
init: false
stage: "experimental"
url: "https://github.com/timmchugh11/haos-addons"

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: services
boot: manual

ingress: true
ingress_port: 8081
panel_icon: mdi:radio-tower
panel_title: MeshCore

ports:
  8081/tcp: null
ports_description:
  8081/tcp: "MeshCore GUI web interface (optional direct access)"

uart: true
usb: true
udev: true
options:
  serial_port: "/dev/ttyACM0"
  baudrate: 115200
  serial_cx_delay: 2.0
  debug: false

schema:
  serial_port: "device(subsystem=tty)"
  baudrate: "int(1200,921600)"
  serial_cx_delay: "float(0,10)"
  debug: "bool"
