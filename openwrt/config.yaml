name: OpenWrt
version: "0.2.0"
slug: openwrt
description: >-
  OpenWrt virtual router running via QEMU/KVM with LuCI web interface.
  Supports configurable LAN/WAN interfaces, WireGuard, Wi-Fi, and more.
url: https://github.com/AlbrechtL/openwrt-docker
arch:
  - amd64
  - aarch64
startup: services
boot: manual
init: false

# KVM and network virtualization require full hardware access.
# full_access is equivalent to Docker's privileged:true.
# host_pid is required for the macvtap/veth network setup.
# Note: after install you may need to disable the "Protection mode" toggle
# in the add-on Info tab for host_pid and full_access to take effect.
full_access: true
host_pid: true
apparmor: false
# Explicit caps for when Protection mode is on (full_access is then ignored).
# NET_ADMIN: needed for nsenter ip-link commands to set up veth/macvtap.
# SYS_ADMIN: needed for bind-mount of persistent storage.
privileged:
  - NET_ADMIN
  - SYS_ADMIN

ports:
  8006/tcp: 8006
  9000/tcp: 9000
ports_description:
  8006/tcp: "OpenWrt TTY console (web browser)"
  9000/tcp: "OpenWrt LuCI web interface (HTTPS, requires forward_luci=true and lan_if=veth)"

webui: http://[HOST]:[PORT:8006]/

options:
  wan_if: "host"
  lan_if: "veth"
  forward_luci: true
  cpu_count: 1
  ram_count: 256
  debug: false

schema:
  wan_if: str
  lan_if: str
  forward_luci: bool
  cpu_count: int
  ram_count: int
  debug: bool
